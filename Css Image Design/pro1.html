<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project for CSS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            justify-content: center;
            display: flex;
            align-items: center;
        }

        .box {
            width: 800px;
            height: 680px;
            position: relative;
            overflow: hidden;
            margin-top: 2%;
        }

        .box img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            transition: all 1s linear;
        }

        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 680px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 1s;
            flex-direction: column;
            border-radius: 20px;
            background: rgb(0, 0, 0);
            transform: translateX(-100%);
            opacity: 0;
        }

        .box:hover .container {
            transform: translateX(0);
            opacity: 1;
        }

        .box:hover img {
            transform: translate(100%);
        }
    </style>
</head>

<body>
    <section class="box">
        <img src="img.jpg" alt="">
        <div class="container">
            <h1>Hello User Welcome!</h1>
            <h2>Lorem ipsum dolor sit amet consectetur adipisicing elit.</h2>
        </div>
    </section>
</body>

</html>
